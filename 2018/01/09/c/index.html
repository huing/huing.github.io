        <p>那个，好像是书中的某段代码</p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># &lt;script&gt;</span></span><br><span class="line"><span class="keyword">function</span> serialize(form)&#123;</span><br><span class="line">    var parts=[],</span><br><span class="line">    field=null,</span><br><span class="line">    i;</span><br><span class="line">    <span class="keyword">for</span>(i=0;i&lt;form.elements.length;i++)&#123;</span><br><span class="line">        field=form.elements[i];</span><br><span class="line">        switch(field.type)&#123;</span><br><span class="line">            <span class="keyword">case</span> <span class="string">"submit"</span>:</span><br><span class="line">            <span class="keyword">case</span> <span class="string">"button"</span>:</span><br><span class="line">            <span class="keyword">case</span> <span class="string">"reset"</span>:</span><br><span class="line">                <span class="built_in">break</span>;</span><br><span class="line">            <span class="keyword">case</span> <span class="string">"radio"</span>:</span><br><span class="line">            default:</span><br><span class="line">                <span class="keyword">if</span>(field.name.length)&#123;</span><br><span class="line">                    parts.push(encodeURIComponent(field.name)+<span class="string">"="</span>+encodeURIComponent(field.value));</span><br><span class="line">                &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="built_in">return</span> parts;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment"># &lt;/script&gt;</span></span><br></pre></td></tr></table></figure>
