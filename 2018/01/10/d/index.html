        <p>之前做过的题<br><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># &lt;script&gt;</span></span><br><span class="line">var arr = [</span><br><span class="line">    &#123;name:<span class="string">'学习'</span>,id: <span class="string">'0'</span>,parentId:null&#125;,</span><br><span class="line">    &#123;name:<span class="string">'看书'</span>,id: <span class="string">'1'</span>,parentId:<span class="string">'0'</span>&#125;,</span><br><span class="line">    &#123;name:<span class="string">'做题'</span>,id: <span class="string">'2'</span>,parentId:<span class="string">'0'</span>&#125;,</span><br><span class="line">    &#123;name:<span class="string">'苏菲的世界'</span>,id: <span class="string">'3'</span>,parentId:<span class="string">'1'</span>&#125;,</span><br><span class="line">    &#123;name:<span class="string">'高数'</span>,id: <span class="string">'4'</span>,parentId:<span class="string">'2'</span>&#125;,</span><br><span class="line">    &#123;name:<span class="string">'英语'</span>,id: <span class="string">'5'</span>,parentId:<span class="string">'2'</span>&#125;</span><br><span class="line">    ];</span><br><span class="line">var firstMenu = <span class="string">"&lt;ul&gt;"</span>,</span><br><span class="line">len = arr.length;</span><br><span class="line"><span class="keyword">function</span> tree(arr)&#123;</span><br><span class="line"><span class="keyword">for</span>(<span class="built_in">let</span> i=0;i&lt;len;i++)&#123;</span><br><span class="line">    <span class="keyword">if</span>(arr[i].parentId == null)&#123;</span><br><span class="line">        firstMenu += <span class="string">"&lt;li&gt;"</span>+arr[i].name;</span><br><span class="line">        second(arr, arr[i]);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line">firstMenu += <span class="string">"&lt;/li&gt;&lt;/ul&gt;"</span>;</span><br><span class="line">$(<span class="string">".tree"</span>).append($(firstMenu));</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">function</span> second(arr, father)&#123;</span><br><span class="line"><span class="built_in">let</span> isFirst = <span class="literal">true</span>,</span><br><span class="line">    sec = <span class="string">" "</span>;</span><br><span class="line"><span class="keyword">for</span>(<span class="built_in">let</span> i=0;i&lt;len;i++)&#123;</span><br><span class="line">    <span class="keyword">if</span>(arr[i].parentId == father.id)&#123;</span><br><span class="line">        <span class="keyword">if</span>(sec == <span class="string">" "</span>)&#123;</span><br><span class="line">            sec = <span class="string">"&lt;ul&gt;"</span></span><br><span class="line">            firstMenu += sec;</span><br><span class="line">        &#125;;</span><br><span class="line">        sec = <span class="string">"&lt;li&gt;"</span>+arr[i].name;</span><br><span class="line">        firstMenu += sec;</span><br><span class="line">        second(arr, arr[i]);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">if</span>(sec != <span class="string">" "</span>) firstMenu+=<span class="string">"&lt;/ul&gt;&lt;/li&gt;"</span>;</span><br><span class="line">&#125;</span><br><span class="line">$(<span class="function"><span class="title">function</span></span>()&#123; tree(arr); &#125;);</span><br><span class="line"><span class="comment"># &lt;/script&gt;</span></span><br></pre></td></tr></table></figure></p>
